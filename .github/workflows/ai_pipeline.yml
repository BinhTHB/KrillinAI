name: "Workflow #2: AI Pipeline"

on:
  repository_dispatch:
    types: [ai_pipeline_start]
  workflow_dispatch:
    inputs:
      r2_prefix:
        description: "Cloudflare R2 object prefix/job_id from Workflow #1"
        required: true
        type: string
      chat_id:
        description: "Telegram chat ID"
        required: false
        default: "0"
        type: string
      message_id:
        description: "Telegram message ID"
        required: false
        default: "0"
        type: string

permissions:
  actions: write
  contents: read

jobs:
  ai:
    runs-on: ubuntu-latest
    env:
      KRILLINAI_DRY_RUN: ${{ secrets.KRILLINAI_DRY_RUN || "true" }}
      CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
      CF_R2_ENDPOINT: ${{ secrets.CF_R2_ENDPOINT }}
      CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
      HF_SPACE_URL: ${{ vars.HF_SPACE_URL }}
      WHISPER_MODEL: ${{ vars.WHISPER_MODEL || "distil-large-v3" }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL || "gemini-1.5-flash" }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests boto3

      - name: Parse trigger context
        id: ctx
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "r2_prefix=${{ github.event.client_payload.r2_prefix }}" >> $GITHUB_OUTPUT
            echo "chat_id=${{ github.event.client_payload.chat_id }}" >> $GITHUB_OUTPUT
            echo "message_id=${{ github.event.client_payload.message_id }}" >> $GITHUB_OUTPUT
          else
            echo "r2_prefix=${{ inputs.r2_prefix }}" >> $GITHUB_OUTPUT
            echo "chat_id=${{ inputs.chat_id }}" >> $GITHUB_OUTPUT
            echo "message_id=${{ inputs.message_id }}" >> $GITHUB_OUTPUT
          fi

      - name: Set env variables
        run: |
          echo "GITHUB_OWNER=${{ github.repository_owner }}" >> $GITHUB_ENV
          echo "GITHUB_REPO=$(echo "${{ github.repository }}" | cut -d"/" -f2)" >> $GITHUB_ENV

      - name: Run AI Pipeline orchestrator
        run: |
          python scripts/v2/workflows/ai_pipeline.py \
            --job-id "${{ steps.ctx.outputs.r2_prefix }}" \
            --chat-id "${{ steps.ctx.outputs.chat_id }}" \
            --message-id "${{ steps.ctx.outputs.message_id }}"

      - name: Trigger Workflow #3 via repository_dispatch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/dispatches \
            -f event_type=render_start \
            -f client_payload[r2_prefix]="${{ steps.ctx.outputs.r2_prefix }}" \
            -f client_payload[chat_id]="${{ steps.ctx.outputs.chat_id }}" \
            -f client_payload[message_id]="${{ steps.ctx.outputs.message_id }}"
