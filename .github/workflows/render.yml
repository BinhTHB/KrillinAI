name: "Workflow #3: Render"

on:
  workflow_dispatch:
    inputs:
      r2_prefix:
        description: "Cloudflare R2 object prefix/job_id from previous workflows"
        required: true
        type: string
      chat_id:
        description: "Telegram chat ID"
        required: false
        default: "0"
        type: string
      message_id:
        description: "Telegram message ID"
        required: false
        default: "0"
        type: string

permissions:
  contents: read

jobs:
  render:
    runs-on: ubuntu-latest
    env:
      KRILLINAI_DRY_RUN: ${{ secrets.KRILLINAI_DRY_RUN || 'true' }}
      CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
      CF_R2_ENDPOINT: ${{ secrets.CF_R2_ENDPOINT }}
      CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
      GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
      GOOGLE_DRIVE_FOLDER_ID: ${{ vars.GOOGLE_DRIVE_FOLDER_ID }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests boto3

      - name: Set env variables
        run: |
          echo "GITHUB_OWNER=${{ github.repository_owner }}" >> $GITHUB_ENV
          echo "GITHUB_REPO=$(echo '${{ github.repository }}' | cut -d'/' -f2)" >> $GITHUB_ENV

      - name: Run Render orchestrator
        run: |
          python scripts/v2/workflows/render.py \
            --job-id "${{ inputs.r2_prefix }}" \
            --chat-id "${{ inputs.chat_id }}" \
            --message-id "${{ inputs.message_id }}"
