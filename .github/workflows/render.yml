name: "Workflow #3: Render (Manual Only)"

on:
  workflow_dispatch:
    inputs:
      r2_prefix:
        description: "Cloudflare R2 object prefix/job_id from previous workflows"
        required: true
        type: string
      chat_id:
        description: "Telegram chat ID"
        required: false
        default: "0"
        type: string
      message_id:
        description: "Telegram message ID"
        required: false
        default: "0"
        type: string

permissions:
  contents: read

jobs:
  render:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'working-branch' && 'production' || 'development' }}
    env:
      KRILLINAI_DRY_RUN: ${{ vars.KRILLINAI_DRY_RUN || 'true' }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
      R2_REGION: ${{ vars.R2_REGION || 'auto' }}
      R2_BUCKET: ${{ vars.R2_BUCKET }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SUBTITLE_HEIGHT: ${{ vars.SUBTITLE_HEIGHT || '120' }}
      SUBTITLE_MARGIN_V: ${{ vars.SUBTITLE_MARGIN_V || '44' }}
      BLUR_POWER: ${{ vars.BLUR_POWER || '10' }}
      BLUR_RADIUS: ${{ vars.BLUR_RADIUS || '5' }}
      BG_VOLUME: ${{ vars.BG_VOLUME || '0.10' }}
      VOICE_VOLUME: ${{ vars.VOICE_VOLUME || '1.6' }}
      TTS_PROVIDER: ${{ vars.TTS_PROVIDER || 'edge' }}
      EDGE_TTS_VOICE: ${{ vars.EDGE_TTS_VOICE || 'vi-VN-HoaiAnNeural' }}
      TTS_SPEED: ${{ vars.TTS_SPEED || '2.1' }}
      TTS_GAP: ${{ vars.TTS_GAP || '0.02' }}
      FORCE_SPEED: ${{ vars.FORCE_SPEED || 'true' }}
      PRESERVE_CUES: ${{ vars.PRESERVE_CUES || 'true' }}
      TIMELINE_MODE: ${{ vars.TIMELINE_MODE || 'overlay' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r scripts/requirements-pipeline.txt

      - name: Parse trigger context
        id: ctx
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "r2_prefix=${{ github.event.client_payload.r2_prefix }}" >> $GITHUB_OUTPUT
            echo "chat_id=${{ github.event.client_payload.chat_id }}" >> $GITHUB_OUTPUT
            echo "message_id=${{ github.event.client_payload.message_id }}" >> $GITHUB_OUTPUT
          else
            echo "r2_prefix=${{ inputs.r2_prefix }}" >> $GITHUB_OUTPUT
            echo "chat_id=${{ inputs.chat_id }}" >> $GITHUB_OUTPUT
            echo "message_id=${{ inputs.message_id }}" >> $GITHUB_OUTPUT
          fi

      - name: Set env variables
        run: |
          echo "GITHUB_OWNER=${{ github.repository_owner }}" >> $GITHUB_ENV
          echo "GITHUB_REPO=$(echo "${{ github.repository }}" | cut -d"/" -f2)" >> $GITHUB_ENV

      - name: Run Render orchestrator
        run: |
          python scripts/v2/workflows/render.py \
            --job-id "${{ steps.ctx.outputs.r2_prefix }}" \
            --chat-id "${{ steps.ctx.outputs.chat_id }}" \
            --message-id "${{ steps.ctx.outputs.message_id }}"






