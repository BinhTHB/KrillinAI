name: "Workflow #1: Ingest"

on:
  repository_dispatch:
    types: [telegram_video_ingest]
  workflow_dispatch:
    inputs:
      video_url:
        description: "Direct video URL to download"
        required: true
        type: string
      chat_id:
        description: "Telegram chat ID"
        required: false
        default: "0"
        type: string
      message_id:
        description: "Telegram message ID"
        required: false
        default: "0"
        type: string

permissions:
  actions: write
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      KRILLINAI_DRY_RUN: ${{ secrets.KRILLINAI_DRY_RUN || "true" }}
      CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
      CF_R2_ENDPOINT: ${{ secrets.CF_R2_ENDPOINT }}
      CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install yt-dlp requests boto3

      - name: Parse trigger context
        id: ctx
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "video_url=${{ github.event.client_payload.videoUrl }}" >> $GITHUB_OUTPUT
            echo "chat_id=${{ github.event.client_payload.chatId }}" >> $GITHUB_OUTPUT
            echo "message_id=${{ github.event.client_payload.messageId }}" >> $GITHUB_OUTPUT
          else
            echo "video_url=${{ inputs.video_url }}" >> $GITHUB_OUTPUT
            echo "chat_id=${{ inputs.chat_id }}" >> $GITHUB_OUTPUT
            echo "message_id=${{ inputs.message_id }}" >> $GITHUB_OUTPUT
          fi

      - name: Set env variables
        run: |
          echo "GITHUB_OWNER=${{ github.repository_owner }}" >> $GITHUB_ENV
          echo "GITHUB_REPO=$(echo "${{ github.repository }}" | cut -d"/" -f2)" >> $GITHUB_ENV

      - name: Run Ingest orchestrator
        id: ingest
        run: |
          python scripts/v2/workflows/ingest.py \
            --job-id "${{ github.run_id }}" \
            --video-url "${{ steps.ctx.outputs.video_url }}" \
            --chat-id "${{ steps.ctx.outputs.chat_id }}" \
            --message-id "${{ steps.ctx.outputs.message_id }}"

      - name: Trigger Workflow #2 via repository_dispatch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/dispatches \
            -f event_type=ai_pipeline_start \
            -f client_payload[r2_prefix]="${{ github.run_id }}" \
            -f client_payload[chat_id]="${{ steps.ctx.outputs.chat_id }}" \
            -f client_payload[message_id]="${{ steps.ctx.outputs.message_id }}"
